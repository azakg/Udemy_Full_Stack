<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mondrian Project</title>
  <style>
    /* 
    Write your CSS here 
    Gap Colour: #000
    White: #F0F1EC
    Red: #E72F24
    Black: #232629
    Blue: #004592
    Yellow: #F9D01E

    For dimensions, see dimensions.png image.
    HINT: Remember you can't change the properties of grid lines.
    But grid lines are transparent!
    */
    .container {
      display: grid;
      grid-template-columns: 320px 320px 50px;
      grid-template-rows: 414px 320px 20px;
      gap: 10px;
      background-color: #000;
    }
    .red {
      display: flex;
      background-color: #E72F24;
      flex-basis: 414px;
    }
    .blue {
      background-color: #004592;
    }
    .yellow {
      background-color: #F9D01E;
    }
    .black {
      background-color: #232629;
    }
    .white1 {
      background-color: #F0F1EC;
      grid-column-start: 2;
      grid-column-end: 4;
    }
    .white2 {
      background-color: #F0F1EC;

    }
    .white3 {
      background-color: #F0F1EC;
    }
    .white4 {
      background-color: #F0F1EC;
    }
    .white5 {
      background-color: #F0F1EC;
    }
    .white6 {
      background-color: #F0F1EC;
    }
    .container2{
      display: grid;
      flex-direction: column;
      background-color: black;
      grid-template-columns: 50px;
      grid-template-rows: 130px 150px;
      gap: 10px;
    }
    .container3{
      display: grid;
      background-color: black;
      grid-template-columns: 198px 153px 50px;
      grid-template-rows: 20px;
      gap: 10px;
    }

  </style>
</head>

<body>
  <!-- Write your HTML here -->

  <div class="container">
    <div class="red"></div>
    <div class="white1"></div>
    <div class="white2"></div>
    <div class="white3"></div>
    <div class="container2">
        <div class="blue"></div>
        <div class="white4"></div>
    </div>
    <div class="white5"></div>
    <div class="container3">
        <div class="yellow"></div>
        <div class="black"></div>
        <div class="white6"></div>
    </div>
    <div class="black"></div>
    <div class="white4"></div>
  </div>
  <button class="btn btn-primary">Click</button>
</body>

</html>
