<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Font Family</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bitcount+Prop+Double+Ink:wght@100..900&display=swap" rel="stylesheet"><link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bitcount+Prop+Double+Ink:wght@100..900&display=swap" rel="stylesheet">

<style>


body{
  font-family: "Bitcount Prop Double Ink", system-ui;
}

button {
  font-family: "Bitcount Prop Double Ink", system-ui;
}

#helvetica {
  font-family: Helvetica, sans-serif;
}

#arial {
  font-family: Arial, sans-serif;
}

#serif {
  font-family: serif;
}

#sans-serif {
  font-family: sans-serif;
}

#cursive {
  font-family: cursive;
}

#monospace {
  font-family: monospace;
}

#fantasy {
  font-family: fantasy;
}

.lobster-two-bold-italic {
  font-family: "Lobster Two", sans-serif;
  font-weight: 700;
  font-style: italic;
}

</style>

</head>

<body>

<h1>Font Family</h1>
<h2 class="lobster-two-bold-italic">Font Family Examples</h2>
<p id="helvetica">Helvetica</p>
<p id="arial">Arial</p>
<p id="serif">Serif</p>
<p id="sans-serif">Sans Serif</p>
<p id="cursive">Cursive</p>
<p id="monospace">Monospace</p>
<p id="fantasy">Fantasy</p>
<button >Lobster Two Bold Italic</button>

</body>

</html>
